services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=taiyo
      - MYSQL_USER=taiyo
      - MYSQL_PASSWORD=taiyo123
    depends_on:
      db:
        condition: service_healthy
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - 8081:80
    environment:
      - PMA_ARBITRARY=0
      - PMA_HOST=db
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:latest
    container_name: taiyo-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taiyo
      MYSQL_USER: taiyo
      MYSQL_PASSWORD: taiyo123
    ports:
      - "3307:3306"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
